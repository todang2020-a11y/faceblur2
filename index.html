<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>얼굴 자동 블러</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Malgun Gothic",Arial,sans-serif;background:#f4f6fb;color:#222}
main{max-width:900px;margin:0 auto;padding:36px 16px}
.card{background:#fff;border-radius:22px;padding:30px;box-shadow:0 10px 35px rgba(0,0,0,.08)}
h1{margin:0 0 8px;font-size:30px}
.sub{margin:0 0 22px;color:#555;line-height:1.6}
.drop{border:3px dashed #b9c3d7;border-radius:18px;padding:34px;text-align:center;background:#fafbff;cursor:pointer}
.drop.drag{background:#eef5ff;border-color:#1f6feb}
.drop b{display:block;font-size:22px;margin-bottom:8px}
.drop span{color:#666}
#fileInput{display:none}
.controls{display:grid;grid-template-columns:110px 1fr 54px;gap:12px;align-items:center;margin:22px 0}
.controls label{font-weight:700}
button,.download{display:inline-block;border:0;border-radius:14px;padding:14px 24px;font-size:16px;font-weight:700;color:#fff;background:#1f6feb;cursor:pointer;text-decoration:none;margin-right:8px}
button:disabled{background:#999;cursor:not-allowed}
.download{background:#159947}
progress{width:100%;height:22px;margin:18px 0 12px}
pre{height:240px;overflow:auto;white-space:pre-wrap;background:#111827;color:#e5e7eb;border-radius:16px;padding:16px;font-size:13px;line-height:1.6}
.note{margin-top:14px;color:#666;font-size:13px;line-height:1.6}
</style>
</head>
<body>
<main>
<section class="card">
<h1>얼굴 자동 블러</h1>
<p class="sub">사진 여러 장을 선택하면 브라우저에서 얼굴을 감지해 블러 처리하고 ZIP 파일로 내려받습니다.<br>사진은 서버에 저장되지 않고, 현재 브라우저 안에서만 처리됩니다.</p>

<div id="drop" class="drop">
  <b>사진 선택 또는 드래그</b>
  <span id="fileText">JPG, PNG 여러 장 선택 가능</span>
  <input id="fileInput" type="file" accept="image/*" multiple>
</div>

<div class="controls">
  <label>블러 강도</label><input id="blurRange" type="range" min="8" max="55" value="28"><span id="blurValue">28</span>
  <label>얼굴 여백</label><input id="padRange" type="range" min="0.05" max="0.40" step="0.01" value="0.18"><span id="padValue">0.18</span>
</div>

<button id="runBtn">실행</button>
<a id="downloadBtn" class="download" href="#" download="face_blur_output.zip" style="display:none;">ZIP 다운로드</a>
<progress id="progress" value="0" max="1"></progress>
<pre id="log">사진을 선택해 주세요.</pre>
<div class="note">
※ 첫 실행 시 AI 모델을 불러오느라 시간이 조금 걸립니다.<br>
※ 자동 인식이라 결과물은 배포 전 꼭 확인해 주세요.<br>
※ Chrome 또는 Edge 권장.
</div>
</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/human/dist/human.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('drop');
const fileText=document.getElementById('fileText');
const runBtn=document.getElementById('runBtn');
const downloadBtn=document.getElementById('downloadBtn');
const progress=document.getElementById('progress');
const logEl=document.getElementById('log');
const blurRange=document.getElementById('blurRange');
const blurValue=document.getElementById('blurValue');
const padRange=document.getElementById('padRange');
const padValue=document.getElementById('padValue');

let selectedFiles=[];
let human=null;

function log(msg, reset=false){
  if(reset) logEl.textContent=msg;
  else logEl.textContent += "\n" + msg;
  logEl.scrollTop=logEl.scrollHeight;
}
blurRange.oninput=()=>blurValue.textContent=blurRange.value;
padRange.oninput=()=>padValue.textContent=padRange.value;

drop.onclick=()=>fileInput.click();
drop.ondragover=(e)=>{e.preventDefault();drop.classList.add('drag')};
drop.ondragleave=()=>drop.classList.remove('drag');
drop.ondrop=(e)=>{e.preventDefault();drop.classList.remove('drag');setFiles([...e.dataTransfer.files])};
fileInput.onchange=(e)=>setFiles([...e.target.files]);

function setFiles(files){
  selectedFiles=files.filter(f=>f.type.startsWith('image/'));
  fileText.textContent=selectedFiles.length ? `${selectedFiles.length}장 선택됨` : 'JPG, PNG 여러 장 선택 가능';
  downloadBtn.style.display='none';
  log(`${selectedFiles.length}장 선택됨`, true);
}

function loadImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error(file.name+' 이미지를 불러오지 못했습니다.'));
    img.src=URL.createObjectURL(file);
  });
}

function canvasToBlob(canvas){
  return new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.94));
}

async function initHuman(){
  if(human) return human;
  if(!window.Human) throw new Error('AI 라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도해 주세요.');
  human = new Human.Human({
    backend:'webgl',
    modelBasePath:'https://cdn.jsdelivr.net/npm/@vladmandic/human/models/',
    cacheModels:true,
    face:{
      enabled:true,
      detector:{enabled:true, rotation:true, maxDetected:100},
      mesh:{enabled:false},
      iris:{enabled:false},
      emotion:{enabled:false},
      description:{enabled:false}
    },
    body:{enabled:false},
    hand:{enabled:false},
    object:{enabled:false},
    gesture:{enabled:false}
  });
  log('AI 모델 로딩 중...');
  await human.load();
  await human.warmup();
  return human;
}

function blurFace(ctx, canvas, box, blurPx, padding){
  let [x,y,w,h]=box;
  const px=w*padding;
  const pyTop=h*padding*1.15;
  const pyBottom=h*padding*0.85;
  x=Math.max(0,x-px);
  y=Math.max(0,y-pyTop);
  w=Math.min(canvas.width-x,w+px*2);
  h=Math.min(canvas.height-y,h+pyTop+pyBottom);
  if(w<=2 || h<=2) return;

  const original=document.createElement('canvas');
  original.width=Math.ceil(w);
  original.height=Math.ceil(h);
  const octx=original.getContext('2d');
  octx.drawImage(canvas,x,y,w,h,0,0,w,h);

  const blurred=document.createElement('canvas');
  blurred.width=original.width;
  blurred.height=original.height;
  const bctx=blurred.getContext('2d');
  bctx.filter=`blur(${blurPx}px)`;
  bctx.drawImage(original,0,0);

  ctx.save();
  ctx.beginPath();
  ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(blurred,x,y,w,h);
  ctx.restore();
}

async function detectWithTimeout(canvas, ms=45000){
  const h=await initHuman();
  return await Promise.race([
    h.detect(canvas),
    new Promise((_,reject)=>setTimeout(()=>reject(new Error('얼굴 인식 시간이 너무 오래 걸립니다. 사진 크기를 줄이거나 1장씩 시도해 주세요.')), ms))
  ]);
}

runBtn.onclick=async()=>{
  if(!selectedFiles.length){ alert('사진을 먼저 선택해 주세요.'); return; }
  runBtn.disabled=true;
  downloadBtn.style.display='none';
  progress.max=selectedFiles.length;
  progress.value=0;
  log('처리 시작', true);

  try{
    await initHuman();
    const zip=new JSZip();
    let total=0;

    for(let i=0;i<selectedFiles.length;i++){
      const file=selectedFiles[i];
      log(`[${i+1}/${selectedFiles.length}] ${file.name} 처리 중`);
      const img=await loadImage(file);
      const canvas=document.createElement('canvas');
      canvas.width=img.naturalWidth || img.width;
      canvas.height=img.naturalHeight || img.height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);

      const result=await detectWithTimeout(canvas);
      const faces=result.face || [];
      total += faces.length;

      for(const face of faces){
        if(face.box) blurFace(ctx, canvas, face.box, Number(blurRange.value), Number(padRange.value));
      }

      const blob=await canvasToBlob(canvas);
      const base=file.name.replace(/\.[^/.]+$/,'');
      zip.file(`${base}_blur.jpg`, blob);
      log(`  얼굴 ${faces.length}개 감지`);
      progress.value=i+1;
    }

    log('ZIP 파일 생성 중...');
    const zipBlob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(zipBlob);
    downloadBtn.href=url;
    downloadBtn.style.display='inline-block';
    log(`완료! 총 얼굴 ${total}개 감지`);
  }catch(err){
    console.error(err);
    log('오류: '+err.message);
    alert('오류가 발생했습니다. 화면 아래 로그를 확인해 주세요.');
  }finally{
    runBtn.disabled=false;
  }
};
</script>
</body>
</html>
